kind = "web"
previewPath = "/"
title = "SIMON AI — The Unburden"
version = "1.0.0"
id = "artifacts/simon-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21893

[services.development]
run = "pnpm --filter @workspace/simon-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/simon-ai", "run", "build" ]
publicDir = "artifacts/simon-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21893"
BASE_PATH = "/"
